name: Build and Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish application
        run: >
          dotnet publish
          -c Release
          -r win-x64
          --self-contained false
          -o publish

      - name: Create ZIP archive
        run: Compress-Archive -Path publish\* -DestinationPath VoiceRecog-${{ github.event.release.tag_name }}.zip

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: VoiceRecog-${{ github.event.release.tag_name }}.zip