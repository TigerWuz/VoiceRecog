# VOICE COMMANDS
gear up: Mobiflight.GEAR_UP
gear down: Mobiflight.GEAR_DOWN
flaps up: Mobiflight.FLAPS_DECR
flaps full up: Mobiflight.FLAPS_UP
flaps down: Mobiflight.FLAPS_INCR
flaps full down: Mobiflight.FLAPS_DOWN
autopilot on: AUTOPILOT_ON
autopilot off: AUTOPILOT_OFF
landing lights on: Mobiflight.LANDING_LIGHTS_ON
landing lights off: Mobiflight.LANDING_LIGHTS_OFF
taxi light on: Mobiflight.TAXI_LIGHTS_ON
taxi light off: Mobiflight.TAXI_LIGHTS_OFF